# render.yaml — one-click deploy of Aether to Render as a single persistent Node service.
#
# Why Render (or Railway / Fly), NOT Vercel: Aether keeps live Server-Sent-Event connections
# and in-memory state (presence hub, session keyring, message history) in ONE long-lived
# process. Serverless platforms split state across short-lived function invocations and cap
# connection duration, which breaks presence/chat/calls. A persistent web service is required.
#
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick the repo. Render reads
# this file, builds, and serves over HTTPS (needed for secure cookies and WebRTC getUserMedia).

services:
  - type: web
    name: aether
    runtime: node
    plan: free # upgrade to keep it always-on (free tier sleeps after inactivity)
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/selftest
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Optional — only if you run your own coturn (services/coturn.conf). Without these the
      # app uses the public OpenRelay TURN baked into lib/rtc/call.ts, so calls still connect.
      - key: TURN_HOST
        sync: false
      - key: TURN_SECRET
        sync: false
