# services/coturn.conf — TURN relay for symmetric-NAT traversal.
# Deploy one per PoP (anycast) so STUN/TURN RTT is tens of ms, not hundreds — this is the
# single biggest lever on TTFF after Trickle ICE.
#
#   docker run -d --network host -v $PWD/services/coturn.conf:/etc/turnserver.conf \
#     coturn/coturn -c /etc/turnserver.conf

listening-port=3478
tls-listening-port=5349

# Ephemeral, HMAC-signed credentials (draft-uberti-behave-turn-rest). The username carries
# an expiry; the password is base64(HMAC-SHA1(username, static-auth-secret)). coturn
# recomputes the same MAC to authorize — no per-user secret storage, auto-expiring.
# The SAME secret is used by lib/signaling/turn.ts turnCredential() to mint creds.
use-auth-secret
static-auth-secret=CHANGE_ME_MATCHES_TURN_SECRET_ENV

realm=aether.app
# Prefer UDP relay (lowest latency); TCP/TLS is the fallback for UDP-blocked networks.
min-port=49152
max-port=65535
no-multicast-peers
no-cli
# Do not relay to loopback/private ranges from public clients (SSRF / internal-scan guard).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
